<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세화여고 212 캘린더</title>
    <!-- 파이어베이스 라이브러리 로드 (Realtime Database 사용) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        @font-face {
            font-family: 'MaruMinya';
            src: url('./MaruMinya.woff2') format('woff2'),
                 url('./MaruMinya.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'MaruMinya', 'Malgun Gothic', sans-serif;
            background-color: #F9F5EB;
            color: #2C1A11;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .calendar-container {
            width: 100%;
            max-width: 500px; /* 모바일 전용 수첩 크기로 콤팩트하게 제한 */
            background: #FDFBF7;
            padding: 20px 15px;
            border: 2px solid #C2A383;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(194, 163, 131, 0.15);
            box-sizing: border-box;
            position: relative;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #E6DEC9;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .main-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* ➕ 우측 상단 일정 추가 버튼 */
        .btn-add-event {
            background-color: #C2A383;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(194, 163, 131, 0.3);
        }

        .calendar-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-nav {
            background: none;
            border: 1px solid #C2A383;
            color: #2C1A11;
            padding: 3px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            background-color: #FDFBF7;
            font-size: 12px;
        }

        .btn-nav:disabled {
            border-color: #E0DCD3;
            color: #E0DCD3;
            cursor: not-allowed;
        }

        .calendar-grid {
            width: 100%;
            border-collapse: collapse;
            background-color: #FFFFFF;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #E6DEC9;
            table-layout: fixed;
        }

        .calendar-grid th, .calendar-grid td {
            width: 14.28%;
            padding: 6px 2px;
            text-align: center;
            border: 1px solid #F4EFE3;
        }

        .calendar-grid th {
            background-color: #FDFBF7;
            color: #A78B71;
            font-size: 12px;
            font-weight: bold;
        }

        .calendar-grid td {
            height: 55px; /* 글자가 빠져서 높이를 대폭 줄여 깔끔하게 만듦 */
            vertical-align: top;
            font-size: 13px;
            position: relative;
            cursor: pointer;
        }

        .calendar-grid td:hover:not(.other-month) {
            background-color: #FDFBF7;
        }

        .today {
            background-color: #FFF9F0 !important;
            border: 1.5px solid #C2A383 !important;
            font-weight: bold;
            color: #C2A383;
        }

        .calendar-grid td.selected {
            background-color: #E6DEC9 !important;
            font-weight: bold;
        }

        .calendar-grid th:nth-child(7), .calendar-grid td:nth-child(7) { color: #8A9A86; }
        .calendar-grid th:nth-child(1), .calendar-grid td:nth-child(1) { color: #C97A7A; }
        .calendar-grid td.other-month { color: #E0DCD3 !important; cursor: default; }

        /* 🔴 일정 표시용 감성 색상 점(Dot) 스타일 */
        .dot-container {
            display: flex;
            justify-content: center;
            gap: 2px;
            margin-top: 4px;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .event-dot {
            width: 5px;
            height: 5px;
            background-color: #C2A383;
            border-radius: 50%;
            display: inline-block;
        }

        /* 모달 팝업창 공통 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            width: 85%;
            max-width: 340px;
            background-color: #FFFFFF;
            border: 2px solid #C2A383;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #A78B71;
        }

        .form-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #E6DEC9;
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #A78B71;
        }

        input, textarea, select {
            width: 100%;
            padding: 9px;
            border: 1px solid #C2A383;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
            background-color: #FDFBF7;
            color: #2C1A11;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-save { background-color: #C2A383; color: white; width: 100%; margin-top: 5px; }

        /* 📋 그날의 일정 목록 보기 전용 스타일 */
        .view-events-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .no-events-msg {
            text-align: center;
            color: #A78B71;
            font-size: 13px;
            padding: 20px 0;
        }

        .saved-event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FDFBF7;
            border: 1px solid #E6DEC9;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .saved-event-info {
            flex: 1;
            word-break: break-all;
        }

        .saved-event-time {
            font-weight: bold;
            color: #C2A383;
            margin-right: 6px;
        }

        .btn-mini-delete {
            background-color: #C97A7A;
            color: white;
            border: none;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <header class="calendar-header">
            <h1 class="main-title">세화여고 212 화이팅! ✨</h1>
            <!-- 우측 상단 플러스 모양 일정 추가 버튼 -->
            <button class="btn-add-event" onclick="openAddModal()">+ 일정 추가</button>
        </header>

        <div class="calendar-section">
            <div class="calendar-controls">
                <button id="btnPrev" class="btn-nav" onclick="moveMonth(-1)">&lt;</button>
                <span id="currentYearMonth"></span>
                <button id="btnNext" class="btn-nav" onclick="moveMonth(1)">&gt;</button>
            </div>
            <table class="calendar-grid">
                <thead>
                    <tr>
                        <th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th>
                    </tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 팝업 1: 📌 특정 날짜 일정 조회 모달 -->
    <div class="modal-overlay" id="viewModalOverlay" onclick="closeModalOutside(event, 'viewModalOverlay')">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('viewModalOverlay')">×</button>
            <h3 class="form-title" id="viewDateTitle">0000-00-00 일정</h3>
            <div class="view-events-list" id="viewListContainer"></div>
        </div>
    </div>

    <!-- 팝업 2: ➕ 새 일정 추가 등록 모달 -->
    <div class="modal-overlay" id="addModalOverlay" onclick="closeModalOutside(event, 'addModalOverlay')">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal('addModalOverlay')">×</button>
            <h3 class="form-title">📅 새로운 일정 추가</h3>

            <form id="eventForm" onsubmit="saveEvent(event)">
                <div class="form-group">
                    <label for="eventDate">날짜 선택</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventTime">시간 설정</label>
                    <input type="time" id="eventTime" required>
                </div>
                <div class="form-group">
                    <label for="eventText">일정 내용</label>
                    <textarea id="eventText" placeholder="할 일을 입력하세요" required></textarea>
                </div>
                <button type="submit" class="btn btn-save">일정 추가하기</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDD1RtC0hmX3qbQhfcoZfDjOx13TBjty6s",
            authDomain: "sehwa-212-cal.firebaseapp.com",
            databaseURL: "https://sehwa-212-cal-default-rtdb.firebaseio.com",
            projectId: "sehwa-212-cal",
            storageBucket: "sehwa-212-cal.firebasestorage.app",
            messagingSenderId: "96132426906",
            appId: "1:96132426906:web:3c3e4b638060ac5af4323"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 제한 범위 (2026년 7월 ~ 2027년 2월)
        const START_LIMIT = new Date(2026, 6, 1);
        const END_LIMIT = new Date(2027, 1, 1);

        const today = new Date();
        const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        let currentDate = new Date();
        if (currentDate < START_LIMIT) {
            currentDate = new Date(START_LIMIT);
        } else if (currentDate > new Date(2027, 1, 28)) {
            currentDate = new Date(END_LIMIT);
        }

        let selectedDateKey = null;
        let eventsData = {}; 

        database.ref('events').on('value', (snapshot) => {
            const data = snapshot.val();
            eventsData = data ? data : {};
            renderCalendar();
            if (selectedDateKey) {
                renderViewEventsList();
            }
        });

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('currentYearMonth').innerText = `${year}년 ${month + 1}월`;

            document.getElementById('btnPrev').disabled = (year === START_LIMIT.getFullYear() && month === START_LIMIT.getMonth());
            document.getElementById('btnNext').disabled = (year === END_LIMIT.getFullYear() && month === END_LIMIT.getMonth());

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();

            const calendarBody = document.getElementById('calendarBody');
            calendarBody.innerHTML = '';

            let dateHtml = '';
            let dayCounter = 1;
            let nextMonthDayCounter = 1;

            for (let i = 0; i < 6; i++) {
                dateHtml += '<tr>';
                for (let j = 0; j < 7; j++) {
                    if (i === 0 && j < firstDayIndex) {
                        dateHtml += `<td class="other-month">${prevLastDate - firstDayIndex + j + 1}</td>`;
                    } else if (dayCounter > lastDate) {
                        dateHtml += `<td class="other-month">${nextMonthDayCounter++}</td>`;
                    } else {
                        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(dayCounter).padStart(2, '0')}`;
                        
                        let cellClasses = [];
                        if (dateKey === todayKey) cellClasses.push('today');
                        if (dateKey === selectedDateKey) cellClasses.push('selected');
                        let classStr = cellClasses.join(' ');
                        
                        // ⭐ 핵심 변경: 글자 배지 대신 귀여운 색상 동그라미 점(Dot) 여러 개 배치
                        let dotsHtml = '';
                        if (eventsData[dateKey]) {
                            const count = Object.keys(eventsData[dateKey]).length;
                            dotsHtml += '<div class="dot-container">';
                            for (let d = 0; d < count; d++) {
                                dotsHtml += '<span class="event-dot"></span>';
                            }
                            dotsHtml += '</div>';
                        }

                        dateHtml += `<td class="${classStr}" onclick="clickDateCell('${dateKey}')">
                            <div>${dayCounter}</div>
                            ${dotsHtml}
                        </td>`;
                        dayCounter++;
                    }
                }
                dateHtml += '</tr>';
                if (dayCounter > lastDate && i >= 4) break;
            }
            calendarBody.innerHTML = dateHtml;
        }

        // 날짜를 클릭하면 그날 일정을 짜르륵 보여주는 목록 창을 띄움
        function clickDateCell(dateKey) {
            selectedDateKey = dateKey;
            document.getElementById('viewDateTitle').innerText = `📌 ${dateKey} 일정`;
            renderCalendar();
            document.getElementById('viewModalOverlay').classList.add('active');
            renderViewEventsList();
        }

        // 플러스 버튼 누르면 일정 등록 모달 오픈
        function openAddModal() {
            document.getElementById('addModalOverlay').classList.add('active');
            // 만약 선택된 날짜창을 연 상태에서 플러스를 누르면 해당 날짜 자동 입력, 아님 오늘날짜 자동 대입
            document.getElementById('eventDate').value = selectedDateKey ? selectedDateKey : todayKey;
            document.getElementById('eventTime').value = '';
            document.getElementById('eventText').value = '';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function closeModalOutside(event, modalId) {
            if(event.target.id === modalId) {
                closeModal(modalId);
            }
        }

        // 특정 날짜의 일정 목록 팝업창 렌더링
        function renderViewEventsList() {
            const container = document.getElementById('viewListContainer');
            container.innerHTML = '';

            if (!selectedDateKey || !eventsData[selectedDateKey]) {
                container.innerHTML = '<div class="no-events-msg">등록된 일정이 없습니다. ✨</div>';
                return;
            }

            const evList = Object.keys(eventsData[selectedDateKey]).map(id => ({
                id: id,
                ...eventsData[selectedDateKey][id]
            }));

            if (evList.length === 0) {
                container.innerHTML = '<div class="no-events-msg">등록된 일정이 없습니다. ✨</div>';
                return;
            }

            evList.sort((a, b) => a.time.localeCompare(b.time));

            evList.forEach(evt => {
                const item = document.createElement('div');
                item.className = 'saved-event-item';
                
                item.innerHTML = `
                    <div class="saved-event-info">
                        <span class="saved-event-time">[${evt.time}]</span>
                        <span>${evt.text}</span>
                    </div>
                    <button class="btn-mini-delete" onclick="deleteEventItem('${evt.id}')">삭제</button>
                `;
                container.appendChild(item);
            });
        }

        // 일정 파이어베이스 저장
        function saveEvent(event) {
            event.preventDefault();
            const targetDate = document.getElementById('eventDate').value;
            const timeValue = document.getElementById('eventTime').value;
            const textValue = document.getElementById('eventText').value;

            if (!targetDate) return alert('날짜를 올바르게 선택해 주세요!');

            database.ref(`events/${targetDate}`).push({
                time: timeValue,
                text: textValue
            }).then(() => {
                alert('일정이 실시간 저장되었습니다.');
                closeModal('addModalOverlay');
                // 저장한 날짜로 포커스 자동 이동해서 보여주기
                selectedDateKey = targetDate;
                clickDateCell(targetDate);
            }).catch((err) => {
                alert('저장 실패: ' + err.message);
            });
        }

        // 일정 관리자 삭제 (비밀번호: 0118)
        function deleteEventItem(eventId) {
            if (!selectedDateKey || !eventsData[selectedDateKey]) return;

            const pwInput = prompt('일정을 삭제하려면 관리자 비밀번호를 입력하세요:');
            
            if (pwInput === "0118") {
                database.ref(`events/${selectedDateKey}/${eventId}`).remove()
                .then(() => {
                    alert('일정이 성공적으로 삭제되었습니다.');
                }).catch((err) => {
                    alert('삭제 실패: ' + err.message);
                });
            } else if (pwInput !== null) {
                alert('비밀번호가 틀렸습니다!');
            }
        }

        function moveMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
            selectedDateKey = null;
        }

        renderCalendar();
    </script>
</body>
</html>
